name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 18

      - name: Install client dependencies
        run: npm install
        working-directory: ./client

      - name: Run client linter
        run: npm run lint
        working-directory: ./client

      - name: Run client formatter
        run: npm run format
        working-directory: ./client

      - name: Install server dependencies
        run: npm install
        working-directory: ./server

      - name: Run server linter
        run: npm run lint
        working-directory: ./server

      - name: Run server formatter
        run: npm run format
        working-directory: ./server
